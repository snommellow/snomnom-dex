name: Regenerate Pokémon Data

on:
  push:
    branches:
      - main
      - claude/**
    paths:
      - 'lib/tcgapi.ts'
      - 'lib/pocketapi.ts'
      - 'lib/pokeapi.ts'
      - 'lib/chains.ts'
      - 'scripts/generate-pokemon-data.ts'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate pokemon-data.json
        env:
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
        run: npm run generate

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/pokemon-data.json
          if git diff --cached --quiet; then
            echo "No changes to pokemon-data.json"
          else
            git commit -m "chore: regenerate pokemon-data.json"
            git push
          fi
